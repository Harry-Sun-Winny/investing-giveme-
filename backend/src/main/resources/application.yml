spring:
  application:
    name: investment-platform
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/investment}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres123}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    out-of-order: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:local-development-secret-change-before-production}
    ttl-minutes: ${SECURITY_JWT_TTL_MINUTES:86400}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}

news:
  ingestion:
    enabled: ${NEWS_INGESTION_ENABLED:true}
    cron: ${NEWS_INGESTION_CRON:0 */15 * * * *}
    max-articles-per-run: ${NEWS_MAX_ARTICLES:30}
    retention-days: ${NEWS_RETENTION_DAYS:1}
  rss:
    feeds:
      - url: https://www.coindesk.com/arc/outboundfeeds/rss/
        source: CoinDesk
      - url: https://feeds.reuters.com/reuters/businessNews
        source: Reuters

server:
  error:
    include-message: never