services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: investment
      POSTGRES_USER: investment
      POSTGRES_PASSWORD: investment_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investment -d investment"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/investment
      SPRING_DATASOURCE_USERNAME: investment
      SPRING_DATASOURCE_PASSWORD: investment_dev_password
      SPRING_DATA_REDIS_HOST: redis
      SECURITY_JWT_SECRET: change-this-secret-before-production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:

